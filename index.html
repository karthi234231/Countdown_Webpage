<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Countdown</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #050505;
      --surface: #0e0e0e;
      --accent: #e8ff47;
      --accent2: #ff4747;
      --text: #f0f0f0;
      --muted: #555;
      --border: #1e1e1e;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    /* ── Photo background ── */
    #bg-photo {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: url('blackFish.jpg') center center / cover no-repeat;
    }

    #bg-photo::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.72) 0%,
        rgba(0,0,0,0.55) 50%,
        rgba(0,0,0,0.78) 100%
      );
    }

    /* ── Grain overlay ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
      opacity: 0.6;
    }

    /* ── Main layout ── */
    .wrapper {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 2rem;
    }

    /* ── Top label ── */
    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.2s forwards;
    }

    /* ── Event title ── */
    .event-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 8vw, 6rem);
      letter-spacing: 0.06em;
      line-height: 1;
      text-align: center;
      color: var(--text);
      margin-bottom: 0.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.4s forwards;
    }

    .event-title span {
      color: var(--accent);
    }

    /* ── Date line ── */
    .event-date {
      font-size: 0.72rem;
      letter-spacing: 0.25em;
      color: var(--muted);
      margin-bottom: 4rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.6s forwards;
    }

    /* ── Countdown grid ── */
    .countdown {
      display: flex;
      gap: clamp(1rem, 4vw, 3rem);
      align-items: flex-start;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.8s forwards;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      position: relative;
    }

    .unit:not(:last-child)::after {
      content: ':';
      position: absolute;
      right: clamp(-1rem, -2.5vw, -1.8rem);
      top: 0.1rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 9vw, 7rem);
      color: var(--border);
      line-height: 1;
      pointer-events: none;
    }

    /* ── Flip card ── */
    .flip-card {
      position: relative;
      width: clamp(72px, 18vw, 140px);
      height: clamp(88px, 22vw, 170px);
      perspective: 600px;
    }

    .flip-card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
    }

    .card-face {
      position: absolute;
      inset: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 9vw, 7rem);
      color: var(--text);
      backface-visibility: hidden;
      overflow: hidden;
    }

    .card-face::before {
      content: '';
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      height: 1px;
      background: rgba(255,255,255,0.04);
    }

    /* Top half shade */
    .card-face.top-shade::after {
      content: '';
      position: absolute;
      inset: 0 0 50% 0;
      background: rgba(0,0,0,0.15);
      pointer-events: none;
    }

    .card-back {
      transform: rotateX(180deg);
    }

    /* flip animation */
    @keyframes flipTop {
      0%   { transform: rotateX(0deg); }
      100% { transform: rotateX(-90deg); }
    }
    @keyframes flipBottom {
      0%   { transform: rotateX(90deg); }
      100% { transform: rotateX(0deg); }
    }

    .flip-top {
      position: absolute;
      inset: 0 0 50% 0;
      overflow: hidden;
      transform-origin: bottom center;
      backface-visibility: hidden;
    }

    .flip-bottom {
      position: absolute;
      inset: 50% 0 0 0;
      overflow: hidden;
      transform-origin: top center;
      backface-visibility: hidden;
    }

    .flip-top-inner, .flip-bottom-inner {
      position: absolute;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 9vw, 7rem);
      color: var(--text);
      background: var(--surface);
      border-radius: 8px 8px 0 0;
    }

    .flip-top-inner { top: 0; height: 200%; }
    .flip-bottom-inner { bottom: 0; height: 200%; border-radius: 0 0 8px 8px; }

    .flip-bottom-inner::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.2);
    }

    .flip-top.animating  { animation: flipTop  0.35s ease-in forwards; }
    .flip-bottom.animating { animation: flipBottom 0.35s ease-out 0.35s forwards; }

    /* ── Label ── */
    .label {
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 300;
    }

    /* ── Accent line ── */
    .accent-bar {
      width: 40px;
      height: 2px;
      background: var(--accent);
      margin-top: 3.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 1.1s forwards;
    }

    /* ── Bottom message (shown at zero) ── */
    .done-msg {
      display: none;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 6vw, 4rem);
      color: var(--accent);
      letter-spacing: 0.1em;
      text-align: center;
      margin-top: 1rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .countdown { gap: 0.6rem; }
      .unit:not(:last-child)::after { display: none; }
      .eyebrow { margin-bottom: 1.5rem; }
      .event-date { margin-bottom: 2.5rem; }
    }
  </style>
</head>
<body>

<div id="bg-photo"></div>

<div class="wrapper">
  <p class="eyebrow">Counting down to</p>
  <h1 class="event-title">New Year <span>2026</span></h1>
  <p class="event-date" id="target-display"></p>

  <div class="countdown" id="countdown">
    <!-- JS renders units here -->
  </div>

  <div class="accent-bar"></div>
  <p class="done-msg" id="done-msg">🎉 It's time!</p>
</div>

<script>
  /* ── Auto-detect next New Year ── */
  function getNextNewYear() {
    const now = new Date();
    const jan1 = new Date(now.getFullYear(), 0, 1); // Jan 1 this year midnight
    // If we're past Jan 1 00:00:00 by more than 24 hours, target next year
    const celebrating = (now - jan1) < 24 * 60 * 60 * 1000; // within 24h of Jan 1
    const targetYear = celebrating ? now.getFullYear() : now.getFullYear() + 1;
    return { date: new Date(targetYear, 0, 1, 0, 0, 0), year: targetYear, celebrating };
  }

  let { date: TARGET_DATE, year: TARGET_YEAR, celebrating: IS_CELEBRATING } = getNextNewYear();

  // Set display
  document.querySelector('.event-title').innerHTML = `New Year <span>${TARGET_YEAR}</span>`;
  document.getElementById('target-display').textContent =
    TARGET_DATE.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  // ── Units config
  const UNITS = ['Days','Hours','Minutes','Seconds'];
  const container = document.getElementById('countdown');

  // Build flip cards
  const cards = {};
  UNITS.forEach(u => {
    const div = document.createElement('div');
    div.className = 'unit';
    div.innerHTML = `
      <div class="flip-card" id="card-${u}">
        <div class="flip-card-inner">
          <div class="card-face top-shade" id="static-${u}">00</div>
          <div class="flip-top" id="top-${u}">
            <div class="flip-top-inner" id="topInner-${u}">00</div>
          </div>
          <div class="flip-bottom" id="bottom-${u}">
            <div class="flip-bottom-inner" id="bottomInner-${u}">00</div>
          </div>
        </div>
      </div>
      <span class="label">${u}</span>`;
    container.appendChild(div);
    cards[u] = { prev: null };
  });

  function pad(n){ return String(n).padStart(2,'0'); }

  function flip(unit, newVal) {
    const cur = cards[unit].prev;
    if (cur === newVal) return;

    const staticEl = document.getElementById(`static-${unit}`);
    const topEl    = document.getElementById(`top-${unit}`);
    const bottomEl = document.getElementById(`bottom-${unit}`);
    const topInner = document.getElementById(`topInner-${unit}`);
    const bottomInner = document.getElementById(`bottomInner-${unit}`);

    topInner.textContent    = pad(cur ?? newVal);
    bottomInner.textContent = pad(newVal);
    staticEl.textContent    = pad(newVal);

    topEl.classList.remove('animating');
    bottomEl.classList.remove('animating');
    void topEl.offsetWidth;
    topEl.classList.add('animating');
    bottomEl.classList.add('animating');

    cards[unit].prev = newVal;
  }

  let celebrateTimer = null;

  function showCelebration() {
    UNITS.forEach(u => flip(u, 0));
    const doneEl = document.getElementById('done-msg');
    doneEl.textContent = `🎉 Happy New Year ${TARGET_YEAR}!`;
    doneEl.style.display = 'block';

    // After 24 hours window, auto-switch to next year countdown
    celebrateTimer = setTimeout(() => {
      doneEl.style.display = 'none';
      // Reset cards
      UNITS.forEach(u => { cards[u].prev = null; });
      const next = getNextNewYear();
      TARGET_DATE = next.date;
      TARGET_YEAR = next.year;
      document.querySelector('.event-title').innerHTML = `New Year <span>${TARGET_YEAR}</span>`;
      document.getElementById('target-display').textContent =
        TARGET_DATE.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
      tick();
    }, 24 * 60 * 60 * 1000);
  }

  function tick() {
    const now  = new Date();
    const diff = TARGET_DATE - now;

    if (diff <= 0) {
      showCelebration();
      return;
    }

    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);

    flip('Days',    d);
    flip('Hours',   h);
    flip('Minutes', m);
    flip('Seconds', s);

    requestAnimationFrame(() => setTimeout(tick, 250));
  }

  // If already in celebration window on load
  if (IS_CELEBRATING) {
    showCelebration();
  } else {
    tick();
  }


</script>
</body>
</html>
